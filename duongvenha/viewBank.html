<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bank Manager • Modern Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { 600: '#2563eb', 700: '#1d4ed8' },
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-300">

<!-- Header -->
<header class="bg-white dark:bg-gray-900 shadow-sm sticky top-0 z-10">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
    <h1 class="text-2xl font-bold text-primary-600 dark:text-blue-400">Bank Manager</h1>
    <div class="flex items-center gap-4">
      <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
        <i class="fa-solid fa-moon text-xl"></i>
      </button>
      <button id="addBankBtn" class="bg-primary-600 hover:bg-primary-700 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2 shadow-md">
        <i class="fa-solid fa-plus"></i> Thêm ngân hàng
      </button>
    </div>
  </div>
</header>

<!-- Main Content -->
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

  <!-- Filter -->
  <div class="mb-8 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div>
      <label for="countryFilter" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Lọc theo quốc gia</label>
      <select id="countryFilter" class="bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 w-full sm:w-64">
        <option value="">Tất cả quốc gia</option>
      </select>
    </div>
    <div class="text-sm text-gray-500 dark:text-gray-400">
      Tổng: <span id="bankCount" class="font-semibold">0</span> ngân hàng
    </div>
  </div>

  <!-- Bank Grid -->
  <div id="bankGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    <!-- Cards sẽ được render bằng JS -->
  </div>

  <!-- Empty state -->
  <div id="emptyState" class="hidden text-center py-20">
    <i class="fa-solid fa-building-columns text-6xl text-gray-300 dark:text-gray-600 mb-4"></i>
    <h3 class="text-xl font-medium mb-2">Chưa có ngân hàng nào</h3>
    <p class="text-gray-500 dark:text-gray-400">Nhấn nút "Thêm ngân hàng" để bắt đầu</p>
  </div>
</main>

<!-- Modal Add/Edit -->
<div id="bankModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl max-w-lg w-full mx-4 overflow-hidden">
    <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
      <h2 class="text-xl font-bold" id="modalTitle">Thêm ngân hàng mới</h2>
      <button id="closeModal" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 text-2xl">&times;</button>
    </div>
    <form id="bankForm" class="p-6 space-y-5">
      <div>
        <label class="block text-sm font-medium mb-1">Quốc gia (ISO2)</label>
        <select id="countryCode" required class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500">
          <option value="">Chọn quốc gia...</option>
          <option value="VN">Việt Nam (VN)</option>
          <option value="US">Hoa Kỳ (US)</option>
          <option value="TH">Thái Lan (TH)</option>
          <option value="SG">Singapore (SG)</option>
          <option value="MY">Malaysia (MY)</option>
          <option value="ID">Indonesia (ID)</option>
          <option value="JP">Nhật Bản (JP)</option>
          <!-- Thêm quốc gia khác nếu cần -->
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Mã ngân hàng</label>
        <input type="text" id="bankCode" required placeholder="VCB, TCB, BOA..." class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500" />
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Tên đầy đủ</label>
        <input type="text" id="bankName" required placeholder="Ngân hàng TMCP Ngoại thương Việt Nam" class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500" />
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Tên ngắn</label>
        <input type="text" id="shortName" placeholder="Vietcombank" class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg" />
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">BIN / Prefix</label>
        <input type="text" id="binPrefix" placeholder="970436" class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg" />
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">URL Logo</label>
        <input type="url" id="logoUrl" placeholder="https://..." class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg" />
      </div>
      <div class="flex justify-end gap-3 pt-4">
        <button type="button" id="cancelModal" class="px-5 py-2.5 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">Hủy</button>
        <button type="submit" class="bg-primary-600 hover:bg-primary-700 text-white px-6 py-2.5 rounded-lg font-medium">Lưu</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 right-6 px-6 py-3 rounded-lg shadow-lg transform translate-y-24 transition-transform duration-300 opacity-0 z-50">
  <!-- Nội dung toast sẽ được thêm bằng JS -->
</div>

<script>
  // Firebase Config ── THAY BẰNG CONFIG CỦA BẠN ──
  const firebaseConfig = {
    apiKey: "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
    authDomain: "bankvanhungbian.firebaseapp.com",
    databaseURL: "https://bankvanhungbian-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "bankvanhungbian",
    storageBucket: "bankvanhungbian.appspot.com",
    messagingSenderId: "XXXXXXXXXXXX",
    appId: "1:XXXXXXXXXXXX:web:xxxxxxxxxxxxxxxxxxxxxx"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // Elements
  const bankGrid = document.getElementById('bankGrid');
  const emptyState = document.getElementById('emptyState');
  const bankCountEl = document.getElementById('bankCount');
  const countryFilter = document.getElementById('countryFilter');
  const addBtn = document.getElementById('addBankBtn');
  const modal = document.getElementById('bankModal');
  const closeModal = document.getElementById('closeModal');
  const cancelModal = document.getElementById('cancelModal');
  const form = document.getElementById('bankForm');
  const modalTitle = document.getElementById('modalTitle');
  const toast = document.getElementById('toast');

  let allBanks = [];
  let currentEditKey = null;

  // Theme toggle
  const themeToggle = document.getElementById('themeToggle');
  themeToggle.addEventListener('click', () => {
    document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
  });

  if (localStorage.getItem('theme') === 'dark' ||
      (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add('dark');
  }

  // Fetch & listen realtime
  const banksRef = db.ref('countries');
  banksRef.on('value', (snapshot) => {
    allBanks = [];
    const countries = snapshot.val() || {};

    Object.entries(countries).forEach(([countryCode, data]) => {
      if (data && data.banks) {
        Object.entries(data.banks).forEach(([bankCode, bank]) => {
          allBanks.push({
            country: countryCode,
            code: bankCode,
            ...bank
          });
        });
      }
    });

    renderBanks(allBanks);
    updateCountryFilter(allBanks);
  });

  function renderBanks(banks) {
    bankGrid.innerHTML = '';
    bankCountEl.textContent = banks.length;

    if (banks.length === 0) {
      emptyState.classList.remove('hidden');
      return;
    }

    emptyState.classList.add('hidden');

    banks.forEach(bank => {
      const card = document.createElement('div');
      card.className = 'bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden hover:shadow-lg transition-shadow duration-200 border border-gray-200 dark:border-gray-700';
      card.innerHTML = `
        <div class="p-5">
          <div class="flex items-center gap-4 mb-4">
            ${bank.logo ? `<img src="${bank.logo}" alt="${bank.shortName || bank.name}" class="w-12 h-12 object-contain rounded-full bg-gray-100 dark:bg-gray-700 p-1">` : 
              `<div class="w-12 h-12 rounded-full bg-primary-100 dark:bg-blue-900/30 flex items-center justify-center text-primary-600 dark:text-blue-400 font-bold text-xl">${bank.code.slice(0,2)}</div>`}
            <div>
              <h3 class="font-semibold text-lg">${bank.name}</h3>
              <p class="text-sm text-gray-500 dark:text-gray-400">${bank.shortName || bank.code}</p>
            </div>
          </div>
          <div class="space-y-2 text-sm">
            <p><span class="font-medium">Quốc gia:</span> ${bank.country}</p>
            <p><span class="font-medium">Mã:</span> ${bank.code}</p>
            ${bank.bin ? `<p><span class="font-medium">BIN:</span> ${bank.bin}</p>` : ''}
            <div class="flex justify-between items-center pt-3">
              <span class="inline-block px-2.5 py-1 rounded-full text-xs font-medium ${bank.status === 'active' ? 'bg-green-100 text-green-700 dark:bg-green-800/30 dark:text-green-400' : 'bg-orange-100 text-orange-700 dark:bg-orange-800/30 dark:text-orange-400'}">
                ${bank.status === 'active' ? 'Hoạt động' : 'Tạm ngừng'}
              </span>
              <div class="flex gap-2">
                <button onclick="editBank('${bank.country}','${bank.code}')" class="text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300">
                  <i class="fa-solid fa-pen-to-square"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
      bankGrid.appendChild(card);
    });
  }

  function updateCountryFilter(banks) {
    const current = countryFilter.value;
    const countries = [...new Set(banks.map(b => b.country))].sort();
    
    countryFilter.innerHTML = '<option value="">Tất cả quốc gia</option>';
    countries.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      countryFilter.appendChild(opt);
    });
    if (countries.includes(current)) countryFilter.value = current;
  }

  // Filter change
  countryFilter.addEventListener('change', () => {
    const filter = countryFilter.value;
    const filtered = filter ? allBanks.filter(b => b.country === filter) : allBanks;
    renderBanks(filtered);
  });

  // Modal handlers
  function openModal(isEdit = false, title = 'Thêm ngân hàng mới') {
    modalTitle.textContent = title;
    modal.classList.remove('hidden');
    if (!isEdit) {
      form.reset();
      currentEditKey = null;
    }
  }

  function closeModalHandler() {
    modal.classList.add('hidden');
    form.reset();
    currentEditKey = null;
  }

  addBtn.addEventListener('click', () => openModal());
  closeModal.addEventListener('click', closeModalHandler);
  cancelModal.addEventListener('click', closeModalHandler);
  modal.addEventListener('click', e => {
    if (e.target === modal) closeModalHandler();
  });

  // Save form
  form.addEventListener('submit', e => {
    e.preventDefault();

    const country = document.getElementById('countryCode').value.trim().toUpperCase();
    const code = document.getElementById('bankCode').value.trim().toUpperCase();
    const name = document.getElementById('bankName').value.trim();

    if (!country || !code || !name) {
      showToast('Vui lòng điền đầy đủ thông tin bắt buộc', 'error');
      return;
    }

    const data = {
      code,
      name,
      shortName: document.getElementById('shortName').value.trim(),
      bin: document.getElementById('binPrefix').value.trim(),
      logo: document.getElementById('logoUrl').value.trim(),
      status: 'active',
      updatedAt: new Date().toISOString()
    };

    if (!currentEditKey) data.createdAt = new Date().toISOString();

    const ref = db.ref(`countries/${country}/banks/${code}`);

    ref.set(data)
      .then(() => {
        showToast(currentEditKey ? 'Cập nhật thành công!' : 'Thêm ngân hàng thành công!', 'success');
        closeModalHandler();
      })
      .catch(err => {
        showToast('Lỗi: ' + err.message, 'error');
        console.error(err);
      });
  });

  // Edit function (gọi từ card)
  window.editBank = function(country, code) {
    const bank = allBanks.find(b => b.country === country && b.code === code);
    if (!bank) return;

    document.getElementById('countryCode').value = bank.country;
    document.getElementById('bankCode').value = bank.code;
    document.getElementById('bankName').value = bank.name;
    document.getElementById('shortName').value = bank.shortName || '';
    document.getElementById('binPrefix').value = bank.bin || '';
    document.getElementById('logoUrl').value = bank.logo || '';

    currentEditKey = `${country}/${code}`;
    openModal(true, `Chỉnh sửa ${bank.code} (${bank.country})`);
  };

  // Toast
  function showToast(message, type = 'success') {
    toast.textContent = message;
    toast.className = `px-6 py-3 rounded-lg shadow-lg transform translate-y-0 opacity-100 transition-all duration-300 z-50 font-medium ${
      type === 'success' 
        ? 'bg-green-600 text-white' 
        : 'bg-red-600 text-white'
    }`;
    
    setTimeout(() => {
      toast.classList.add('translate-y-24', 'opacity-0');
    }, 3200);
  }
</script>
</body>
</html>
